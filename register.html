<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - Coffee Cafe</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="./style.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
</head>
<body>
<div id="navbar"></div>

<div class="container vh-100 d-flex justify-content-center align-items-center">
  <div class="card register-card border-0 shadow-lg p-5">
    <div class="text-center mb-4">
      <h2 class="fw-bold">Create Account</h2>
      <p class="text-muted">Join Coffee Cafe today</p>
    </div>
    <div id="registerMessage"></div>
    <form onsubmit="registerUser(event)">
      <div class="mb-3">
        <label class="form-label">Full Name</label>
        <input type="text" name="name" class="form-control" placeholder="Andrea Kimi Antonelli" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Email Address</label>
        <input type="email" name="email" class="form-control" placeholder="kimiandrea07@gmail.com" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-control" placeholder="Create password" required>
      </div>
      <div class="mb-4">
        <label class="form-label">Confirm Password</label>
        <input type="password" name="confirm_password" class="form-control" placeholder="Confirm password" required>
      </div>
      <button class="btn btn-dark w-100 py-3">Register</button>
    </form>
    <div class="text-center mt-4">
      <p>Already have an account?
        <a href="./login.html" class="text-decoration-none fw-bold">Login Here</a>
      </p>
    </div>
  </div>
</div>

<div id="footer"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="./app.js"></script>

</body>
</html>
