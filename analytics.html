<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Analytics</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="./style.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
<div id="navbar"></div>

<div class="container py-5">
  <h1 class="fw-bold mb-5">Analytics Dashboard</h1>
  <div class="row g-4">
    <div class="col-lg-3"><div class="stats-card text-center"><h5>Today's Sales</h5><h1 id="todaySales">RM 0</h1></div></div>
    <div class="col-lg-3"><div class="stats-card text-center"><h5>Weekly Sales</h5><h1 id="weeklySales">RM 0</h1></div></div>
    <div class="col-lg-3"><div class="stats-card text-center"><h5>Monthly Sales</h5><h1 id="monthlySales">RM 0</h1></div></div>
    <div class="col-lg-3"><div class="stats-card text-center"><h5>Total Orders</h5><h1 id="totalOrders">0</h1></div></div>
  </div>
  <div class="row g-4 mt-1">
    <div class="col-lg-6"><div class="stats-card text-center"><h5>Total Revenue</h5><h1 id="totalRevenue">RM 0</h1></div></div>
    <div class="col-lg-6"><div class="stats-card text-center"><h5>Total Drinks Sold</h5><h1 id="totalDrinks">0</h1></div></div>
  </div>
  <div class="card border-0 shadow-lg mt-5 p-4">
    <h3 class="mb-4">Recent Orders</h3>
    <table class="table">
      <thead><tr><th>Customer</th><th>Date</th><th>Total</th></tr></thead>
      <tbody id="recentOrders"></tbody>
    </table>
  </div>
  <div class="row mt-5 g-4">
    <div class="col-lg-8">
      <div class="card border-0 shadow-lg p-4 h-100">
        <h3 class="mb-4">Weekly Sales Analytics</h3>
        <canvas id="salesChart"></canvas>
      </div>
    </div>
    <div class="col-lg-4">
      <div class="card border-0 shadow-lg p-4 h-100">
        <h3 class="mb-4">Top Selling Drinks</h3>
        <canvas id="drinkChart"></canvas>
      </div>
    </div>
  </div>
</div>

<div id="footer"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="./app.js"></script>
<script>document.addEventListener("DOMContentLoaded", renderAnalyticsPage);</script>
</body>
</html>
